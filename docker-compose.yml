services:
  database:
    image: mongo:latest
    container_name: aetheria-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  ml-service:
    build:
      context: ./my-app/backend/ml_services
    container_name: aetheria-ml
    ports:
      - "8000:8000"
    restart: always

  app:
    build:
      context: ./my-app
    container_name: aetheria-app
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://database:27017/society-management
      - ML_SERVICE_URL=http://ml-service:8000
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - TWILIO_SERVICE_SID=${TWILIO_SERVICE_SID}
      - SMTP_HOST=smtp.ethereal.email
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=Aetheria <noreply@aetheria.com>
    depends_on:
      - database
      - ml-service
    restart: always

volumes:
  mongodb_data:
